# Verdaccio configuration
# Increase max body size for large packages
max_body_size: 900mb

# Storage path
storage: ./verdaccioStorage

# Server listen
listen: 0.0.0.0:4873

# Uplinks - define upstream registries
uplinks:
  npmjs:
    url: https://registry.npmjs.org/
    timeout: 30s
    cache: true
    strict_ssl: false

# Packages configuration
packages:
  '@fragola-ai/agentic-sdk-core':
    access: $all
    publish: $all
    unpublish: $all

  '**':
    access: $all
    publish: $all
    unpublish: $all
    proxy: npmjs
